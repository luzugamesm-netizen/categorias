<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educación de Categorías Ridery</title>
    <style>
        :root {
            --verde-menta: #38CEA6;
            --negro-azulado: #0F111E;
            --rosa-intenso: #D71D5C;
            --azul-real: #272883;
            --blanco: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanco);
            color: var(--negro-azulado);
            margin: 0; padding: 20px;
        }

        .container { max-width: 900px; margin: auto; }

        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 4px solid var(--verde-menta);
            margin-bottom: 30px;
        }

        .filtros {
            background: var(--negro-azulado);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .filtros label { color: var(--verde-menta); font-weight: bold; display: block; margin-bottom: 5px; }

        select, input {
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--verde-menta); font-size: 1rem;
        }

        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .card {
            border: 2px solid #eef; padding: 15px; border-radius: 12px; text-align: center;
        }

        .card.active {
            border-color: var(--verde-menta);
            background: rgba(56, 206, 166, 0.1);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(56, 206, 166, 0.2);
        }

        .card h3 { margin: 0 0 10px; color: var(--azul-real); }

        .buscador-match {
            background: #f8fafc; border: 2px solid var(--verde-menta);
            padding: 25px; border-radius: 15px;
        }

        button {
            background: var(--verde-menta); color: var(--negro-azulado);
            border: none; padding: 15px; width: 100%; border-radius: 10px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            margin-top: 15px; text-transform: uppercase;
        }

        .feedback-area {
            margin-top: 20px; padding: 20px; border-radius: 10px;
            display: none; background: white; border-left: 6px solid var(--verde-menta);
        }

        .insuficiente { color: var(--rosa-intenso); font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard de Categorías <span>Ridery</span></h1>
    </div>

    <div class="filtros">
        <div style="flex:1">
            <label>CIUDAD (31)</label>
            <select id="ciudad" onchange="actualizar()"></select>
        </div>
        <div style="flex:1">
            <label>TIPO DE VEHÍCULO</label>
            <select id="flota" onchange="actualizar()">
                <option value="Carro">Carro 🚗</option>
                <option value="Moto">Moto 🏍️</option>
            </select>
        </div>
    </div>

    <div class="grid-categorias" id="grid"></div>

    <div class="buscador-match">
        <h2 style="margin-top:0; color: var(--azul-real);">Simulador de Explicación</h2>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <div><label>Viajes</label><input type="number" id="in_v" value="0"></div>
            <div><label>Rating</label><input type="number" id="in_r" step="0.1" value="0"></div>
            <div><label>Canc %</label><input type="number" id="in_c" value="0"></div>
            <div><label>Acept %</label><input type="number" id="in_a" value="0"></div>
        </div>
        <button onclick="explicar()">Generar Explicación para Conductor</button>

        <div id="feedback" class="feedback-area">
            <div id="fb-titulo" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 10px;"></div>
            <div id="fb-cuerpo" style="line-height: 1.6;"></div>
        </div>
    </div>
</div>

<script>
    const ciudades = ["Maracay","Puerto La Cruz","Mérida","Valencia","Barinas","Maturín","Caracas","Maracaibo","Ciudad Guayana","Barquisimeto","Porlamar","San Cristóbal","Guarenas","Los Teques","Acarigua","San Antonio de Los Altos","Coro","Guatire","Cumaná","La Guaira","La Victoria","Charallave","Barcelona","Cabimas","Ciudad Bolívar","Colonia Tovar","Cúa","El Vigía","Higuerote","Margarita","Puerto Cabello"].sort();

    const niveles = [
        { n: "Evaluación", r: 0, c: 100, a: 0 },
        { n: "Impulso", r: 4.0, c: 20, a: 35 },
        { n: "En Ascenso", r: 4.5, c: 15, a: 40 },
        { n: "Destacado", r: 4.7, c: 12, a: 45 },
        { n: "Líder", r: 4.8, c: 10, a: 60 }
    ];

    // Data aproximada basada en tus archivos (Reseteada para las 31 ciudades)
    const dataV = {
        "Carro": {
            "Maracay":[76,77,96,120,150],"Puerto La Cruz":[89,90,113,141,177],"Mérida":[73,74,92,115,144],"Valencia":[73,74,92,115,144],"Barinas":[74,75,93,117,146],"Maturín":[73,74,92,115,144],"Caracas":[80,81,101,126,157],"Maracaibo":[73,74,92,115,144],"Ciudad Guayana":[73,74,92,115,144],"Barquisimeto":[50,51,64,80,100],"Porlamar":[50,51,63,79,99],"San Cristóbal":[43,44,55,69,86],"Guarenas":[31,32,40,50,63],"Los Teques":[31,32,40,50,63],"Acarigua":[32,33,42,52,65],"San Antonio de Los Altos":[31,32,40,50,63],"Coro":[82,83,104,130,162],"Guatire":[31,32,40,50,63],"Cumaná":[35,36,45,56,70],"La Guaira":[35,36,45,56,70],"La Victoria":[35,36,45,56,70],"Charallave":[31,32,40,50,63],"Barcelona":[89,90,113,141,177],"Cabimas":[35,36,45,56,70],"Ciudad Bolívar":[73,74,92,115,144],"Colonia Tovar":[35,36,45,56,70],"Cúa":[31,32,40,50,63],"El Vigía":[73,74,92,115,144],"Higuerote":[35,36,45,56,70],"Margarita":[50,51,63,79,99],"Puerto Cabello":[35,36,45,56,70]
        },
        "Moto": {
            "Maracay":[143,144,152,167,192],"Puerto La Cruz":[129,130,136,150,172],"Mérida":[136,137,144,159,182],"Valencia":[104,105,110,121,139],"Barinas":[115,116,122,134,154],"Maturín":[107,108,113,124,143],"Caracas":[78,79,83,91,105],"Maracaibo":[73,74,78,85,98],"Ciudad Guayana":[73,74,78,85,98],"Barquisimeto":[60,61,64,71,81],"Porlamar":[59,60,63,69,79],"San Cristóbal":[82,83,87,96,110],"Guarenas":[31,32,34,37,43],"Los Teques":[31,32,34,37,43],"Acarigua":[31,32,34,37,43],"San Antonio de Los Altos":[31,32,34,37,43],"Coro":[73,74,78,85,98],"Guatire":[31,32,34,37,43],"Cumaná":[60,61,64,71,81],"La Guaira":[60,61,64,71,81],"La Victoria":[143,144,152,167,192],"Charallave":[31,32,34,37,43],"Barcelona":[129,130,136,150,172],"Cabimas":[60,61,64,71,81],"Ciudad Bolívar":[73,74,78,85,98],"Colonia Tovar":[60,61,64,71,81],"Cúa":[31,32,34,37,43],"El Vigía":[136,137,144,159,182],"Higuerote":[60,61,64,71,81],"Margarita":[59,60,63,69,79],"Puerto Cabello":[60,61,64,71,81]
        }
    };

    function init() {
        const sel = document.getElementById('ciudad');
        ciudades.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.innerText = c; sel.appendChild(opt);
        });
        actualizar();
    }

    function actualizar() {
        const ciu = document.getElementById('ciudad').value;
        const flo = document.getElementById('flota').value;
        const vData = dataV[flo][ciu];
        const grid = document.getElementById('grid');
        
        grid.innerHTML = niveles.map((niv, i) => `
            <div class="card" id="card-${i}">
                <h3>${niv.n}</h3>
                <div style="font-size:0.8rem">Viajes: <b>${vData[i]}</b></div>
                <div style="font-size:0.8rem">Rating: <b>${i==0?'-':niv.r}</b></div>
                <div style="font-size:0.8rem">Canc: <b>${i==0?'-':niv.c+'%'}</b></div>
            </div>
        `).join('');
    }

    function explicar() {
        const ciu = document.getElementById('ciudad').value;
        const flo = document.getElementById('flota').value;
        const vReq = dataV[flo][ciu];
        
        const v = parseInt(document.getElementById('in_v').value) || 0;
        const r = parseFloat(document.getElementById('in_r').value) || 0;
        const c = parseFloat(document.getElementById('in_c').value) || 0;
        const a = parseFloat(document.getElementById('in_a').value) || 0;

        let actual = 0;
        for(let i=4; i>=0; i--) {
            if(i === 0 || (v >= vReq[i] && r >= niveles[i].r && c <= niveles[i].c && a >= niveles[i].a)) {
                actual = i; break;
            }
        }

        // Resaltado visual
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${actual}`).classList.add('active');

        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        const tit = document.getElementById('fb-titulo');
        const cuerpo = document.getElementById('fb-cuerpo');

        if(actual < 4) {
            const sgte = niveles[actual + 1];
            const vFaltan = vReq[actual + 1] - v;
            
            tit.innerHTML = `Estatus: <span style="color:var(--azul-real)">${niveles[actual].n}</span>`;
            tit.style.color = "var(--negro-azulado)";
            
            let razones = [];
            if(v < vReq[actual + 1]) razones.push(`no tienes los <b>viajes suficientes</b> (te faltan ${vFaltan})`);
            if(r < sgte.r) razones.push(`tu <b>rating</b> (${r}) está por debajo del mínimo de ${sgte.r}`);
            if(c > sgte.c) razones.push(`tu <b>tasa de cancelación</b> (${c}%) está muy elevada (el máximo es ${sgte.c}%)`);
            if(a < sgte.a) razones.push(`tu <b>tasa de aceptación</b> (${a}%) es muy baja (mínimo ${sgte.a}%)`);

            let explicacion = `Hola, actualmente no cumples para subir a la categoría <b>"${sgte.n}"</b> porque `;
            if(razones.length === 1) explicacion += razones[0] + ".";
            else {
                const ultimo = razones.pop();
                explicacion += razones.join(", ") + " y también porque " + ultimo + ".";
            }

            cuerpo.innerHTML = explicacion + ` <br><br><span class="insuficiente">¡Sigue trabajando en estos puntos para el próximo corte!</span>`;
            fb.style.borderLeftColor = "var(--rosa-intenso)";
        } else {
            tit.innerHTML = "Estatus: LÍDER 👑";
            cuerpo.innerHTML = "¡Excelente trabajo! Cumples con todos los estándares máximos de Ridery. Mantén tus indicadores así para conservar los beneficios.";
            fb.style.borderLeftColor = "var(--verde-menta)";
        }
    }

    window.onload = init;
</script>

</body>
</html>
